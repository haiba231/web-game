<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Nusantara - Fase Peretasan</title>
    <style>
        /* Gaya Estetika Cyberpunk & Glassmorphism */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #08080a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        
        #coreCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none; /* Agar klik tidak terhalang UI */
        }

        .glass-panel {
            background: rgba(12, 16, 28, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.25);
            border-radius: 12px;
            padding: 15px 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .neon-text {
            color: #00f3ff;
            text-shadow: 0 0 5px #00f3ff;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }
        
        .tutorial {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Panel Informasi (UI) -->
    <div id="ui-layer" class="glass-panel">
        <h2 class="neon-text">Sistem Eksekusi Saraf</h2>
        <div>Integritas Memori: <span id="scoreDisplay" style="color: #fcee0a; font-weight: bold;">0</span>%</div>
        <div class="tutorial">Kontrol: Panah Keyboard (PC) / Sentuh & Geser (Mobile)</div>
    </div>

    <!-- Kanvas Render Game -->
    <canvas id="coreCanvas"></canvas>

    <script>
        const canvas = document.getElementById('coreCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');

        // Menyesuaikan ukuran kanvas dengan layar
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Entitas Pemain (Nadi / Peretas)
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 25,
            height: 25,
            color: '#00f3ff',
            speed: 7
        };

        let viruses = [];
        let score = 0;
        let isGameOver = false;
        const keys = {};

        // Kontrol Keyboard
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        // Kontrol Sentuh untuk Mobile
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            player.x = touch.clientX - (player.width / 2);
            player.y = touch.clientY - (player.height / 2);
        }, { passive: false });

        // Fungsi Memunculkan Rintangan (Virus Trauma)
        function spawnVirus() {
            viruses.push({
                x: Math.random() * (canvas.width - 30),
                y: -50,
                width: 20 + Math.random() * 20,
                height: 20 + Math.random() * 20,
                color: Math.random() > 0.5 ? '#ff00ff' : '#fcee0a', // Magenta atau Kuning
                speedY: 4 + Math.random() * 4,
                speedX: (Math.random() - 0.5) * 2
            });
        }

        // Logika Fisika dan Benturan
        function update() {
            if (isGameOver) return;

            // Pergerakan Pemain
            if ((keys['ArrowLeft'] || keys['a']) && player.x > 0) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['d']) && player.x < canvas.width - player.width) player.x += player.speed;
            if ((keys['ArrowUp'] || keys['w']) && player.y > 0) player.y -= player.speed;
            if ((keys['ArrowDown'] || keys['s']) && player.y < canvas.height - player.height) player.y += player.speed;

            // Pergerakan Virus
            for (let i = viruses.length - 1; i >= 0; i--) {
                let v = viruses[i];
                v.y += v.speedY;
                v.x += v.speedX;

                // Cek Benturan (Collision Detection)
                if (player.x < v.x + v.width &&
                    player.x + player.width > v.x &&
                    player.y < v.y + v.height &&
                    player.height + player.y > v.y) {
                    
                    isGameOver = true;
                    alert('Sistem Terdistorsi! Peretasan Gagal.\nSkor Akhir: ' + score + '%\nMuat ulang halaman untuk mencoba lagi.');
                    return;
                }

                // Tambah skor jika berhasil menghindar
                if (v.y > canvas.height) {
                    viruses.splice(i, 1);
                    score += 5;
                    scoreDisplay.innerText = score;
                }
            }

            // Kemunculan musuh secara acak
            if (Math.random() < 0.06) spawnVirus();
        }

        // Render Grafis
        function draw() {
            // Efek bayangan bergerak (Trail effect) pada latar belakang
            ctx.fillStyle = 'rgba(8, 8, 10, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Gambar Pemain
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Gambar Virus (sebagai segitiga/bentuk cacat digital)
            viruses.forEach(v => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = v.color;
                ctx.fillStyle = v.color;
                
                ctx.beginPath();
                ctx.moveTo(v.x, v.y);
                ctx.lineTo(v.x + v.width, v.y + (v.height/2));
                ctx.lineTo(v.x + (v.width/2), v.y + v.height);
                ctx.closePath();
                ctx.fill();
            });

            // Matikan efek glow agar tidak mengacaukan performa
            ctx.shadowBlur = 0;
        }

        // Siklus Permainan Utama (Game Loop)
        function gameLoop() {
            update();
            draw();
            if (!isGameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Mulai Permainan
        gameLoop();
    </script>
</body>
</html>
